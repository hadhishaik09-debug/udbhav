services:
  backend:
    build:
      context: .
    container_name: health-record-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/health_records?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: 9a67471b-d18e-4a64-92e1-4822086e88e1e7f6e4d9b3c2d1a0e9f8g7h6i5j4k3l2m1n0
      JWT_EXPIRATION: 86400000
      SPRING_MAIL_HOST: smtp.example.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your_email@example.com
      SPRING_MAIL_PASSWORD: your_password
    ports:
      - "8081:8080"

  mysql:
    image: mysql:8.4
    container_name: health-record-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: health_records
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
